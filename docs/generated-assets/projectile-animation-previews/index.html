<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nexus Projectile Animations</title>
  <style>
    body { margin: 0; background: #0b0f14; color: #e8edf5; font-family: system-ui, sans-serif; }
    main { padding: 24px; }
    h1 { font-size: 20px; margin: 0 0 16px; font-weight: 650; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(176px, 1fr)); gap: 14px; }
    figure { margin: 0; padding: 10px; background: #111821; border: 1px solid #243142; border-radius: 8px; }
    img { width: 100%; display: block; border-radius: 4px; }
    figcaption { margin-top: 8px; font-size: 12px; color: #aab6c7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  </style>
</head>
<body>
  <main>
    <h1>Nexus Projectile Animations</h1>
    <section class="grid">
      <figure><img src="clans/dahack.gif" alt="[Da:Hack] projectile animation"><figcaption>[Da:Hack]</figcaption></figure>
      <figure><img src="clans/aliens.gif" alt="Aliens projectile animation"><figcaption>Aliens</figcaption></figure>
      <figure><img src="clans/alpha.gif" alt="Alpha projectile animation"><figcaption>Alpha</figcaption></figure>
      <figure><img src="clans/chasers.gif" alt="Chasers projectile animation"><figcaption>Chasers</figcaption></figure>

      <figure><img src="clans/deviants.gif" alt="Deviants projectile animation"><figcaption>Deviants</figcaption></figure>
      <figure><img src="clans/enigma.gif" alt="Enigma projectile animation"><figcaption>Enigma</figcaption></figure>
      <figure><img src="clans/fury.gif" alt="Fury projectile animation"><figcaption>Fury</figcaption></figure>
      <figure><img src="clans/gamblers.gif" alt="Gamblers projectile animation"><figcaption>Gamblers</figcaption></figure>
      <figure><img src="clans/kingpin.gif" alt="Kingpin projectile animation"><figcaption>Kingpin</figcaption></figure>
      <figure><img src="clans/mafia.gif" alt="Mafia projectile animation"><figcaption>Mafia</figcaption></figure>
      <figure><img src="clans/metropolis.gif" alt="Metropolis projectile animation"><figcaption>Metropolis</figcaption></figure>
      <figure><img src="clans/micron.gif" alt="Micron projectile animation"><figcaption>Micron</figcaption></figure>
      <figure><img src="clans/nemos.gif" alt="Nemos projectile animation"><figcaption>Nemos</figcaption></figure>

</body>
</html>
